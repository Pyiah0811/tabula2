<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Campus Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LANDSCAPE GATE: shown only in portrait mode on mobile -->
    <div id="rotatePrompt">
        <div class="rotate-content">
            <div class="rotate-icon">⟳</div>
            <p>Please rotate your device to landscape mode to play.</p>
        </div>
    </div>

    <div class="canvas-wrapper" id="gameWrapper">
        <canvas></canvas>

        <!-- Search + Info Panels (top-right) -->
        <div class="search-wrapper">
            <div class="search-container" id="searchContainer">
                <input type="text" class="search-input" placeholder="Search buildings..." id="searchInput">
                <div class="search-icon" id="searchBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
            </div>
            <div id="infoPanel"></div>
            <div id="roomPanel">
                <h4>Building Rooms</h4>
                <hr>
                <div id="roomList"></div>
            </div>
        </div>

        <!-- Mobile D-Pad (bottom-left, outside search-wrapper) -->
        <div id="mobileControls">
            <div class="control-row">
                <button class="joy-btn" id="btn-w">▲</button>
            </div>
            <div class="control-row">
                <button class="joy-btn" id="btn-a">◀</button>
                <button class="joy-btn" id="btn-s">▼</button>
                <button class="joy-btn" id="btn-d">▶</button>
            </div>
        </div>
    </div>
    
    <script src="classes.js"></script>
    <script src="pathfinder.js"></script>
    <script src="npc.js"></script>
    <script src="index.js"></script>
    <script src="searchMap.js"></script>
</body>
</html>
