<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Tabula - Admin Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script src="../assets/auth.js"></script>

    <style>
        body {
            margin: 0;
            background-color: #3a1c05;
            background-image: url("bg.png");
            background-size: cover;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .dashboard-container {
            width: 1100px;
            background: #c9822b;
            border: 6px solid #5b2f07;
            padding: 40px;
            box-shadow: 10px 10px 0px #000;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 100px;
        }

        header {
            text-align: center;
            border-bottom: 4px solid #5b2f07;
            padding-bottom: 15px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 22px;
            text-shadow: 3px 3px #5b2f07;
            margin: 10px 0;
        }

        .greeting {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #5b2f07;
            margin-bottom: 5px;
        }

        .actions-panel {
            background: #5b2f07;
            padding: 25px;
            border: 4px solid #3a1c05;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .pixel-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 15px 20px;
            background: #c9822b;
            color: white;
            border: 4px solid #3a1c05;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: 0.1s;
        }

        .pixel-btn:hover {
            transform: translateY(2px);
            box-shadow: 2px 2px 0px #000;
            background: #e6a24a;
        }

        .btn-logout { background: #ae2012; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: #9b5d1a;
            border: 4px solid #5b2f07;
            padding: 25px;
            text-align: center;
            box-shadow: inset -4px -4px 0px #5b2f07;
        }

        .stat-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            margin-bottom: 15px;
            color: #ffd166;
            line-height: 1.4;
        }

        .stat-value {
            font-size: 40px;
            font-weight: bold;
            color: #ffffff;
        }

        .history-placeholder {
            border: 4px dashed #5b2f07;
            padding: 40px;
            text-align: center;
            color: #5b2f07;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <div class="greeting" id="adminGreet">WELCOME, USER</div>
        <h1>COMMAND CENTER</h1>
    </header>

    <div class="actions-panel">
        <div class="btn-group">
            <button class="pixel-btn" onclick="location.href='admin_mgmt.html'">USERS</button>
            <button class="pixel-btn" onclick="location.href='manage_buildings.html'">BUILDINGS</button>
            <button class="pixel-btn" onclick="location.href='../menu.html'">GAME MENU</button>
            <button class="pixel-btn btn-logout" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">TOTAL<br>USERS</div>
            <div class="stat-value" id="countUsers">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">TOTAL<br>ADMINS</div>
            <div class="stat-value" id="countAdmins">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">CAMPUS<br>BUILDINGS</div>
            <div class="stat-value" id="countBuildings">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">NEW<br>ENTRIES</div>
            <div class="stat-value" id="countNew">0</div>
        </div>
    </div>

    <div class="history-placeholder">
        [ ACTIVITY HISTORY LOG COMING SOON ]
    </div>
</div>

<script>
    // 1. Setup greeting
    const adminName = localStorage.getItem("userName") || "ADMIN";
    document.getElementById('adminGreet').innerText = `WELCOME, ${adminName.toUpperCase()}`;

    // 2. Fetch stats
    fetch('get_admin_stats.php')
        .then(res => res.json())
        .then(data => {
            document.getElementById('countUsers').innerText = data.totalUsers;
            document.getElementById('countAdmins').innerText = data.totalAdmins;
            document.getElementById('countBuildings').innerText = data.totalBuildings;
            document.getElementById('countNew').innerText = data.newThisWeek;
        })
        .catch(err => console.log("Stats fetch failed."));
</script>

</body>
</html>
