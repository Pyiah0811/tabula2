<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Tabula - Manage Buildings</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="../assets/auth.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden; 
            background: #3a1c05 url("../bg.png") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .admin-panel {
            width: 1000px;
            height: 85vh;
            background: #c9822b;
            border: 6px solid #5b2f07;
            padding: 20px;
            box-shadow: 8px 8px 0px #000;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            font-size: 16px;
            text-shadow: 2px 2px #5b2f07;
            margin: 0 0 20px 0;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .search-box {
            background: #5b2f07;
            border: 3px solid #3a1c05;
            padding: 10px;
            color: #ffd166;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            outline: none;
            flex-grow: 1;
            max-width: 350px;
        }

        .table-container {
            overflow-y: auto;
            border: 4px solid #5b2f07;
            background: #9b5d1a;
            flex-grow: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            position: sticky;
            top: 0;
            background: #5b2f07;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            color: #ffd166;
            z-index: 10;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px 15px;
            border-bottom: 2px solid #5b2f07;
            font-size: 13px;
        }

        .desc-cell {
            font-size: 10px; /* Reduced font size */
            color: #ddd;
            line-height: 1.3;
            max-width: 300px;
            padding-right: 20px;
        }

        .asset-preview {
            width: 110px; /* Increased width */
            height: 80px; /* Increased height */
            object-fit: contain;
            image-rendering: pixelated;
            display: block;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.4));
        }

        .pixel-btn {
            background: #4caf50;
            color: white;
            border: 3px solid #1e3a20;
            padding: 8px 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
        }

        .btn-back { background: #fb5607; border-color: #9e2a2b; }
        .btn-edit { background: #e6a24a; border-color: #5b2f07; }

        .pixel-btn:active { transform: translateY(2px); box-shadow: 1px 1px 0px #000; }

        .table-container::-webkit-scrollbar { width: 10px; }
        .table-container::-webkit-scrollbar-track { background: #5b2f07; }
        .table-container::-webkit-scrollbar-thumb { background: #c9822b; border: 2px solid #5b2f07; }
    </style>
</head>
<body>

<div class="admin-panel">
    <h1>BUILDING ASSETS</h1>
    
    <div class="top-bar">
        <button class="pixel-btn btn-back" onclick="location.href='admin_dashboard.html'">BACK</button>
        <input type="text" id="searchInput" class="search-box" placeholder="SEARCH ASSETS...">
        <button class="pixel-btn" onclick="location.href='asset_view.html'">GRID VIEW</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 160px;">NAME</th>
                    <th>DESCRIPTION</th>
                    <th style="width: 130px;">IMAGE</th>
                    <th style="width: 100px;">ACTION</th>
                </tr>
            </thead>
            <tbody id="buildingTable"></tbody>
        </table>
    </div>
</div>

<script>
    let allBuildings = [];
    const tableBody = document.getElementById('buildingTable');
    const searchInput = document.getElementById('searchInput');

    function renderTable(data) {
        tableBody.innerHTML = '';
        data.forEach(bldg => {
            const imgPath = bldg.image ? `../map/${bldg.image}` : `../map/img/placeholder.png`;
            const description = bldg.description || "No description provided.";

            tableBody.innerHTML += `
                <tr>
                    <td style="font-weight: bold; color: #ffd166;">${bldg.name.toUpperCase()}</td>
                    <td class="desc-cell">${description}</td>
                    <td>
                        <img src="${imgPath}" class="asset-preview" alt="asset" onerror="this.src='../../img/placeholder.png'">
                    </td>
                    <td>
                        <button class="pixel-btn btn-edit" onclick="location.href='edit_building.html?id=${bldg.id}'">EDIT</button>
                    </td>
                </tr>`;
        });
    }

    fetch('../php/api_buildings.php')
        .then(res => res.json())
        .then(data => {
            allBuildings = data;
            renderTable(allBuildings);
        })
        .catch(err => console.log("API Error."));

    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allBuildings.filter(b => 
            b.name.toLowerCase().includes(term) || 
            (b.description && b.description.toLowerCase().includes(term))
        );
        renderTable(filtered);
    });
</script>

</body>
</html>
